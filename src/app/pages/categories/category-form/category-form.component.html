<div class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="edit-modal-title">
  <div class="modal">
    <div class="modal__header">
      <h2 id="edit-modal-title" class="modal__title">Category</h2>
    </div>

    @if (store.loading()) {
      <div class="modal__loading" aria-live="polite" aria-label="Loading">
        <span class="spinner"></span>
      </div>
    } @else if (store.category()) {
      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate class="modal__form">
        <div class="field">
          <span class="field__label">Id</span>
          <span class="field__value">{{ store.category()!.id }}</span>
        </div>

        <div class="field">
          <label class="field__label" for="edit-name">Name</label>
          <input
            id="edit-name"
            type="text"
            formControlName="name"
            class="field__input"
            [class.field__input--error]="nameErrorMessage"
            aria-required="true"
            [attr.aria-invalid]="!!nameErrorMessage"
            aria-describedby="edit-name-error"
          />
          @if (nameErrorMessage) {
            <span id="edit-name-error" class="field__error" role="alert">{{ nameErrorMessage }}</span>
          }
        </div>

        @if (store.saveError()) {
          <p class="server-error" role="alert">{{ store.saveError() }}</p>
        }

        <div class="modal__actions">
          <button type="button" class="btn btn--secondary" (click)="onClose()">Close</button>
          @if (store.category()?.canEdit) {
            <button
              type="submit"
              class="btn btn--primary"
              [disabled]="store.saving() || form.pending"
            >
              @if (store.saving()) {
                <span class="spinner" aria-hidden="true"></span>
              }
              Save
            </button>
          }
        </div>
      </form>
    }
  </div>
</div>
